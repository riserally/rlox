site_name: "rlox — Rust-Accelerated Reinforcement Learning"
site_url: https://riserally.github.io/rlox/
site_description: "Rust data plane + Python control plane for RL. 3-50x faster than SB3/TorchRL."
repo_url: https://github.com/riserally/rlox
repo_name: riserally/rlox
docs_dir: docs

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - python
          options:
            show_source: false
            show_root_heading: true
            members_order: source
            show_signature_annotations: true
  # Internationalization (i18n).
  #
  # File-naming convention: page translations use a `.<lang>.md` suffix
  # next to the default English file, e.g.:
  #   docs/index.md       <- default (English)
  #   docs/index.pl.md    <- Polish
  #   docs/index.de.md    <- German
  #   docs/index.fr.md    <- French
  #
  # Pages without a translation fall through to the default (English).
  # See docs/CONTRIBUTING-translations.md for the contributor workflow.
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: pl
          name: Polski
          build: true
          site_name: "rlox — Reinforcement Learning w Ruście"
        - locale: de
          name: Deutsch
          build: true
          site_name: "rlox — Rust-beschleunigtes Reinforcement Learning"
        - locale: fr
          name: Français
          build: true
          site_name: "rlox — Apprentissage par renforcement accéléré par Rust"

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

