# rlox docker-compose.yml
#
# Provides four services for reproducible paper experiments:
#
#   test                  — full test suite (cargo test + pytest)
#   benchmark-components  — fast component benchmarks (GAE, buffer ops, etc.)
#   benchmark-convergence — long-running convergence experiments
#   benchmark-all         — runs everything sequentially
#
# All services write outputs under ./results (host) → /workspace/results (container).
# Experiments from rlox-priv are mounted read-only so the image stays pristine.
#
# Usage:
#   docker compose build
#   docker compose run --rm test
#   docker compose run --rm benchmark-components
#   docker compose run --rm benchmark-convergence
#   docker compose run --rm benchmark-all

x-rlox-base: &rlox-base
  build:
    context: .
    dockerfile: Dockerfile
    target: experiment-runner
    # Pass build args explicitly for reproducibility metadata.
    args:
      RUST_VERSION: "1.86"
      PYTHON_VERSION: "3.12"
  image: rlox-experiments:0.2.3
  environment:
    PYTHONUNBUFFERED: "1"
    MUJOCO_GL: "egl"
    RAYON_NUM_THREADS: "0"
    RLOX_RESULTS_DIR: /workspace/results
    TF_CPP_MIN_LOG_LEVEL: "3"
    CUBLAS_WORKSPACE_CONFIG: ":4096:8"
  volumes:
    # Results: read-write so experiments can write output files.
    - ./results:/workspace/results
    # Experiments from rlox-priv: mounted read-only at runtime.
    # Override EXPERIMENTS_DIR env var or this path to point elsewhere.
    - ${EXPERIMENTS_DIR:-../rlox-priv/experiments}:/workspace/experiments:ro
  # Reasonable defaults; override with docker-compose.gpu.yml for GPU nodes.
  deploy:
    resources:
      limits:
        memory: 16G
  # Remove containers automatically after they exit.
  init: true

services:

  # --------------------------------------------------------------------------
  # test: run the full test suite
  # Cargo tests already ran during `docker build`; this reruns pytest so
  # researchers can confirm the environment is correct before long runs.
  # --------------------------------------------------------------------------
  test:
    <<: *rlox-base
    container_name: rlox-test
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        echo "=== rlox test suite ==="
        echo "--- Rust tests (run during image build) ---"
        cat /opt/rlox/rust-test-output.txt

        echo ""
        echo "--- Python tests ---"
        python -m pytest /opt/rlox/python/../.. 2>/dev/null || \
        python -m pytest tests/python/ -v --timeout=120 -m "not slow" \
            --tb=short \
            --junitxml=/workspace/results/pytest-results.xml \
          2>&1 | tee /workspace/results/pytest-output.txt

        echo ""
        echo "=== All tests passed ==="

  # --------------------------------------------------------------------------
  # benchmark-components: fast micro-benchmarks (< 10 min total)
  # Runs bench_gae, bench_buffer_ops, bench_env_stepping, bench_nn_backends,
  # bench_e2e_rollout, bench_llm_ops, bench_trl_comparison.
  # --------------------------------------------------------------------------
  benchmark-components:
    <<: *rlox-base
    container_name: rlox-bench-components
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        echo "=== Component benchmarks ==="
        OUTDIR=/workspace/results/component_benchmarks
        mkdir -p "$OUTDIR"

        run_bench() {
          local name=$1
          local script=$2
          echo "--- $name ---"
          python "$script" --output-dir "$OUTDIR" 2>&1 | tee "$OUTDIR/${name}.log" || \
            echo "WARN: $name exited with error — check $OUTDIR/${name}.log"
        }

        cd /opt/rlox

        run_bench bench_gae        benchmarks/bench_gae.py
        run_bench bench_buffer_ops benchmarks/bench_buffer_ops.py
        run_bench bench_env_stepping benchmarks/bench_env_stepping.py
        run_bench bench_nn_backends benchmarks/bench_nn_backends.py
        run_bench bench_e2e_rollout benchmarks/bench_e2e_rollout.py
        run_bench bench_llm_ops    benchmarks/bench_llm_ops.py
        run_bench bench_trl        benchmarks/bench_trl_comparison.py

        echo "=== Component benchmarks complete — results in $OUTDIR ==="

  # --------------------------------------------------------------------------
  # benchmark-convergence: long-running convergence experiments (hours)
  # Mounts the rlox-priv experiments directory and delegates to the experiment
  # runner scripts.  Set CONVERGENCE_ENVS to a comma-separated list of
  # Gymnasium environment IDs to override defaults (e.g. CartPole-v1,HalfCheetah-v4).
  # --------------------------------------------------------------------------
  benchmark-convergence:
    <<: *rlox-base
    container_name: rlox-bench-convergence
    entrypoint: ["/bin/bash", "-c"]
    environment:
      PYTHONUNBUFFERED: "1"
      MUJOCO_GL: "egl"
      RAYON_NUM_THREADS: "0"
      RLOX_RESULTS_DIR: /workspace/results
      TF_CPP_MIN_LOG_LEVEL: "3"
      CUBLAS_WORKSPACE_CONFIG: ":4096:8"
      CONVERGENCE_ENVS: "${CONVERGENCE_ENVS:-CartPole-v1,HalfCheetah-v4,Hopper-v4}"
    command:
      - |
        set -euo pipefail
        echo "=== Convergence benchmarks ==="
        echo "Environments: $CONVERGENCE_ENVS"

        OUTDIR=/workspace/results/convergence
        mkdir -p "$OUTDIR"

        # Prefer the private experiment scripts if mounted; fall back to the
        # open-source convergence benchmarks bundled in the image.
        if [ -d /workspace/experiments/convergence ]; then
          CONV_DIR=/workspace/experiments/convergence
        else
          CONV_DIR=/opt/rlox/benchmarks/convergence
        fi

        echo "Using convergence scripts from: $CONV_DIR"

        python "$CONV_DIR/run_all.py" \
            --output-dir "$OUTDIR" \
            --envs "$CONVERGENCE_ENVS" \
          2>&1 | tee "$OUTDIR/convergence.log" || \
        python -m pytest "$CONV_DIR" -v --timeout=3600 \
            --tb=short \
            --junitxml="$OUTDIR/convergence-results.xml" \
          2>&1 | tee "$OUTDIR/convergence.log"

        echo "=== Convergence benchmarks complete — results in $OUTDIR ==="

  # --------------------------------------------------------------------------
  # experiments: TDD experiment suite (correctness → performance → convergence)
  # Runs the private experiment framework from rlox-priv/experiments/
  # --------------------------------------------------------------------------
  experiments:
    <<: *rlox-base
    container_name: rlox-experiments
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        echo "=== TDD Experiment Suite ==="
        cd /workspace/experiments

        echo "--- Phase 1: Correctness tests ---"
        python -m pytest -m "correctness" -v --timeout=60 \
            --tb=short \
            --junitxml=/workspace/results/correctness-results.xml \
          2>&1 | tee /workspace/results/correctness.log

        echo ""
        echo "--- Phase 2: Performance benchmarks (correctness-gated) ---"
        python -m pytest -m "performance" -v --timeout=300 \
            --tb=short \
            --junitxml=/workspace/results/performance-results.xml \
          2>&1 | tee /workspace/results/performance.log

        echo ""
        echo "=== Experiment suite complete ==="
        ls -lh /workspace/results/

  # --------------------------------------------------------------------------
  # experiments-full: TDD suite including slow convergence + ablation tests
  # --------------------------------------------------------------------------
  experiments-full:
    <<: *rlox-base
    container_name: rlox-experiments-full
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -euo pipefail
        echo "=== Full TDD Experiment Suite (with convergence + ablation) ==="
        cd /workspace/experiments

        python run_all_experiments.py \
            --convergence --ablation \
            --results-dir /workspace/results \
          2>&1 | tee /workspace/results/full-experiments.log

        echo "=== Full experiment suite complete ==="

  # --------------------------------------------------------------------------
  # benchmark-all: run components then convergence sequentially
  # --------------------------------------------------------------------------
  benchmark-all:
    <<: *rlox-base
    container_name: rlox-bench-all
    entrypoint: ["/bin/bash", "-c"]
    environment:
      PYTHONUNBUFFERED: "1"
      MUJOCO_GL: "egl"
      RAYON_NUM_THREADS: "0"
      RLOX_RESULTS_DIR: /workspace/results
      TF_CPP_MIN_LOG_LEVEL: "3"
      CUBLAS_WORKSPACE_CONFIG: ":4096:8"
      CONVERGENCE_ENVS: "${CONVERGENCE_ENVS:-CartPole-v1,HalfCheetah-v4,Hopper-v4}"
    command:
      - |
        set -euo pipefail
        echo "=== Full benchmark suite ==="

        COMP_OUTDIR=/workspace/results/component_benchmarks
        mkdir -p "$COMP_OUTDIR"

        cd /opt/rlox

        for bench in \
            benchmarks/bench_gae.py \
            benchmarks/bench_buffer_ops.py \
            benchmarks/bench_env_stepping.py \
            benchmarks/bench_nn_backends.py \
            benchmarks/bench_e2e_rollout.py \
            benchmarks/bench_llm_ops.py \
            benchmarks/bench_trl_comparison.py; do
          name=$(basename "$bench" .py)
          echo "--- $name ---"
          python "$bench" --output-dir "$COMP_OUTDIR" 2>&1 | tee "$COMP_OUTDIR/${name}.log" || \
            echo "WARN: $name failed — see log"
        done

        CONV_OUTDIR=/workspace/results/convergence
        mkdir -p "$CONV_OUTDIR"

        if [ -d /workspace/experiments/convergence ]; then
          CONV_DIR=/workspace/experiments/convergence
        else
          CONV_DIR=/opt/rlox/benchmarks/convergence
        fi

        python "$CONV_DIR/run_all.py" \
            --output-dir "$CONV_OUTDIR" \
            --envs "$CONVERGENCE_ENVS" \
          2>&1 | tee "$CONV_OUTDIR/convergence.log" || \
        python -m pytest "$CONV_DIR" -v --timeout=3600 \
            --tb=short \
            --junitxml="$CONV_OUTDIR/convergence-results.xml" \
          2>&1 | tee "$CONV_OUTDIR/convergence.log"

        echo "=== Full benchmark suite complete ==="
        echo "Results written to /workspace/results"
        ls -lh /workspace/results/
