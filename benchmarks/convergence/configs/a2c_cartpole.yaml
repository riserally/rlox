algorithm: A2C
environment: CartPole-v1
action_space: discrete
threshold: 475.0
max_steps: 100_000
eval_freq: 1_000
eval_episodes: 10

hyperparameters:
  n_envs: 8
  n_steps: 5
  learning_rate: 7.0e-4
  gamma: 0.99
  gae_lambda: 1.0
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5

policy:
  type: MlpPolicy
  hidden_sizes: [64, 64]
