algorithm: DQN
environment: MountainCar-v0
action_space: discrete
threshold: -110.0
max_steps: 120_000
eval_freq: 5_000
eval_episodes: 10

# Hyperparameters from rl-baselines3-zoo (proven to reach -110 in ~120k steps).
# Source: https://github.com/DLR-RM/rl-baselines3-zoo/blob/master/hyperparams/dqn.yml
hyperparameters:
  buffer_size: 10_000
  batch_size: 128
  learning_rate: 4.0e-3
  gamma: 0.98
  exploration_fraction: 0.2
  exploration_final_eps: 0.07
  target_update_freq: 600
  learning_starts: 1_000
  hidden: 256
  # Match SB3-zoo update cadence — without this rlox over-trains on early
  # transitions and never explores far enough to reach the goal flag.
  train_freq: 16
  gradient_steps: 8

policy:
  type: MlpPolicy
  hidden_sizes: [256, 256]
