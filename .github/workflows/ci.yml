name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
  CARGO_TERM_COLOR: always

jobs:
  rust-tests:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - run: cargo test --workspace

  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install pytest gymnasium torch numpy pyyaml
      - run: python -m pytest tests/ -q --tb=short -m "not slow"

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - run: cargo clippy --workspace --all-targets -- -D warnings -A clippy::too_many_arguments -A clippy::type_complexity -A clippy::empty_line_after_doc_comments -A clippy::manual_range_contains -A clippy::repeat_vec_with_capacity

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  python-lint:
    name: Python lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install ruff
          ruff check python/rlox/ --select E,F,W --ignore E501

  slow-tests:
    name: Slow tests (convergence)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install pytest pytest-timeout gymnasium torch numpy pyyaml "gymnasium[mujoco]"
      - run: python -m pytest tests/ -q --tb=short -m "slow" --timeout=300

  wheel-smoke:
    name: Wheel smoke test
    needs: [rust-tests, python-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[all]"
      - run: |
          python -c "import rlox; print(f'rlox {rlox.__version__}'); assert hasattr(rlox, 'Trainer')"
          python -c "from rlox import Trainer; t = Trainer('ppo', env='CartPole-v1', seed=42); m = t.train(1000); print('Smoke test OK')"
