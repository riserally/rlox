syntax = "proto3";
package rlox.env;

service EnvService {
    // Step all environments with the given batch of actions.
    rpc StepBatch(StepRequest) returns (StepResponse);

    // Reset all environments, optionally with a deterministic seed.
    rpc ResetBatch(ResetRequest) returns (ResetResponse);

    // Query the environment's action and observation spaces.
    rpc GetSpaces(Empty) returns (SpacesResponse);
}

message Empty {}

message StepRequest {
    // Flat array of actions: for discrete envs, one f32 per env cast to u32;
    // for continuous, act_dim floats per env.
    repeated float actions = 1;
    // Whether the action space is discrete.
    bool discrete = 2;
    // Dimensionality of a single action (1 for discrete).
    uint32 act_dim = 3;
}

message StepResponse {
    // Flat observations: num_envs * obs_dim floats.
    repeated float obs = 1;
    // Rewards, one per environment.
    repeated double rewards = 2;
    // Terminated flags, one per environment.
    repeated bool terminated = 3;
    // Truncated flags, one per environment.
    repeated bool truncated = 4;
    // Observation dimensionality.
    uint32 obs_dim = 5;
    // Number of environments in this worker.
    uint32 num_envs = 6;
}

message ResetRequest {
    // Optional master seed. 0 means no seed.
    uint64 seed = 1;
    bool has_seed = 2;
}

message ResetResponse {
    // Flat observations: num_envs * obs_dim floats.
    repeated float obs = 1;
    uint32 obs_dim = 2;
    uint32 num_envs = 3;
}

message SpacesResponse {
    // JSON-encoded ActionSpace (reuses serde representation).
    string action_space_json = 1;
    // JSON-encoded ObsSpace.
    string obs_space_json = 2;
    // Number of environments.
    uint32 num_envs = 3;
}
