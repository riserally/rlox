    - TRPO: algorithms/trpo.md
    - DQN: algorithms/dqn.md
    - TD3: algorithms/td3.md
    - SAC: algorithms/sac.md
    - IMPALA: algorithms/impala.md
    - DreamerV3: algorithms/dreamer.md
    - MAPPO: algorithms/mappo.md
    - LLM Post-Training (DPO/GRPO): llm-post-training.md
