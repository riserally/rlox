algorithm: PPO
environment: Acrobot-v1
action_space: discrete
threshold: -100.0
max_steps: 500_000
eval_freq: 1_000
eval_episodes: 10

hyperparameters:
  n_envs: 8
  n_steps: 256
  batch_size: 256
  n_epochs: 4
  learning_rate: 2.5e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  normalize_obs: false
  normalize_reward: false

policy:
  type: MlpPolicy
  hidden_sizes: [64, 64]
