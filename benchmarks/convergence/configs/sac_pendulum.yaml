algorithm: SAC
environment: Pendulum-v1
action_space: continuous
threshold: -200.0
max_steps: 50_000
eval_freq: 1_000
eval_episodes: 10

hyperparameters:
  buffer_size: 1_000_000
  batch_size: 256
  learning_rate: 3.0e-4
  gamma: 0.99
  tau: 0.005
  learning_starts: 1_000
  train_freq: 1
  gradient_steps: 1
  ent_coef: auto

policy:
  type: MlpPolicy
  hidden_sizes: [256, 256]
