baseURL = "https://wojciechkpl.github.io/rlox/blog/"
languageCode = "en-us"
title = "wojciechkpl blog"
theme = "PaperMod"
copyright = "wojciechkpl"

[params]
  env = "production"
  description = "Engineering blog by wojciechkpl — Rust-accelerated reinforcement learning, benchmarks, and technical deep-dives"
  author = "Wojciech Kowalinski"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  defaultTheme = "dark"

  [params.homeInfoParams]
    Title = "wojciechkpl blog"
    Content = "Engineering blog by wojciechkpl — updates, benchmarks, and technical deep-dives on Rust-accelerated reinforcement learning."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/wojciechkpl"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/wojciechkpl/rlox"

[menu]
  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 10
  [[menu.main]]
    identifier = "archives"
    name = "Archives"
    url = "/archives/"
    weight = 20
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 30
  [[menu.main]]
    identifier = "docs"
    name = "Docs"
    url = "https://wojciechkpl.github.io/rlox/"
    weight = 40

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  tag = "tags"
  category = "categories"
